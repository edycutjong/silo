<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--primary, #3b82f6)" />
      <stop offset="100%" stop-color="var(--accent, #22c55e)" />
    </linearGradient>

    <!-- Subtler inner gradient for backdrop -->
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(59, 130, 246, 0.15)" />
      <stop offset="100%" stop-color="rgba(34, 197, 94, 0.02)" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Grid Dots -->
  <g opacity="0.15">
    <circle cx="96" cy="96" r="3" fill="#ffffff" />
    <circle cx="256" cy="96" r="3" fill="#ffffff" />
    <circle cx="416" cy="96" r="3" fill="#ffffff" />
    <circle cx="96" cy="256" r="3" fill="#ffffff" />
    <circle cx="416" cy="256" r="3" fill="#ffffff" />
    <circle cx="96" cy="416" r="3" fill="#ffffff" />
    <circle cx="256" cy="416" r="3" fill="#ffffff" />
    <circle cx="416" cy="416" r="3" fill="#ffffff" />
  </g>

  <!-- Outer Ring with Gradient Stroke -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#brandGrad)" stroke-width="4" opacity="0.3" stroke-dasharray="16 8" />

  <!-- Hexagonal secure boundary -->
  <polygon points="256,60 420,155 420,345 256,440 92,345 92,155" 
           fill="url(#innerGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

  <!-- The "Silo" Cylinder in Center -->
  <!-- Bottom cap -->
  <ellipse cx="256" cy="360" rx="90" ry="35" fill="url(#brandGrad)" opacity="0.2" filter="url(#glow)" />
  
  <!-- Back of top cap / body -->
  <path d="M166,180 L166,360 A90,35 0 0,0 346,360 L346,180 A90,35 0 0,0 166,180 Z" 
        fill="url(#innerGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="2" />

  <!-- Secure vertical data slots (silo shielding panels) -->
  <path d="M190,195 L190,345 A66,25 0 0,0 322,345 L322,195 A66,25 0 0,0 190,195 Z" 
        fill="url(#brandGrad)" filter="url(#glow)" opacity="0.8" />
  
  <!-- Lock overlay on the silo cylinder to indicate security -->
  <g transform="translate(256,260)">
    <!-- Shield lock body -->
    <path d="M-20,-10 L20,-10 L15,20 L0,30 L-15,20 Z" fill="#090e1a" stroke="url(#brandGrad)" stroke-width="2" />
    <!-- Lock shackle -->
    <path d="M-12,-10 L-12,-22 A12,12 0 0,1 12,-22 L12,-10" fill="none" stroke="url(#brandGrad)" stroke-width="2" />
    <!-- Center checkmark indicating verified human -->
    <path d="M-6,7 L-2,11 L6,3" fill="none" stroke="var(--accent, #22c55e)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Incoming anonymous data packets (flowing in from top) -->
  <circle cx="256" cy="110" r="6" fill="var(--accent, #22c55e)" filter="url(#glow)" />
  <circle cx="210" cy="130" r="4" fill="var(--primary, #3b82f6)" opacity="0.7" />
  <circle cx="302" cy="125" r="5" fill="var(--primary, #3b82f6)" opacity="0.8" />
  
  <!-- Floating secure shield indicator (top left) -->
  <path d="M110,120 A25,25 0 0,0 135,145 L135,130 Z" fill="none" stroke="url(#brandGrad)" stroke-width="1.5" stroke-dasharray="2 2" />
</svg>
