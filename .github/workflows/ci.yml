name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Code Quality ─────────────────────────────────
  agent-quality:
    name: "Stage 1 · Agent Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: agent/package-lock.json
      - name: Install dependencies
        run: cd agent && npm ci
      - name: Build and Type Check
        run: cd agent && npm run build

  ui-quality:
    name: "Stage 1 · UI Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        run: cd ui && npm ci
      - name: Type check
        run: cd ui && npm run typecheck
      - name: Lint
        run: cd ui && npm run lint

  contract-quality:
    name: "Stage 1 · Contract Quality (Rust)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        run: cd contract && cargo test

  # ── STAGE 2: Security Gate ────────────────────────────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Audit agent dependencies
        run: cd agent && npm audit --audit-level=high
        continue-on-error: true
      - name: Audit ui dependencies
        run: cd ui && npm audit --audit-level=high
        continue-on-error: true

  # ── STAGE 3: Build Verification ───────────────────────────
  build-ui:
    name: "Stage 3 · UI Build Verification"
    needs: [ui-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        run: cd ui && npm ci
      - name: Next.js production build
        run: cd ui && npm run build

  build-contract:
    name: "Stage 3 · Contract Build Verification"
    needs: [contract-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cargo build target wasm
        run: cd contract && cargo build --target wasm32-unknown-unknown --release

  # ── STAGE 4: E2E Tests ────────────────────────────────────
  e2e:
    name: "Stage 4 · E2E Tests"
    needs: [build-ui]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        run: cd ui && npm ci
      - name: Install Playwright browsers
        run: cd ui && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd ui && npm run e2e
        continue-on-error: true

  # ── STAGE 5: Performance ──────────────────────────────────
  performance:
    name: "Stage 5 · Performance"
    needs: [build-ui]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        run: cd ui && npm ci
      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          cd ui && npx lhci autorun
        continue-on-error: true

  # ── STAGE 6: Deploy Gate ──────────────────────────────────
  deploy-gate:
    name: "Stage 6 · Deploy Gate"
    needs: [build-ui, build-contract, e2e, performance, secret-scan, dependency-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: All gates passed
        run: |
          echo "🚀 All CI/CD gates passed!"

  # ── STAGE 7: Publish to npmjs & GitHub Packages (main only) ──
  publish-npm:
    name: "Stage 7 · Publish to npmjs & GitHub Packages"
    needs: [deploy-gate]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for npmjs
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: |
            cli/package-lock.json

      - name: Install and Build CLI
        run: |
          cd cli
          npm ci
          npm run build

      - name: Check and Publish CLI to npmjs
        run: |
          cd cli
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if npm view @edycutjong/silo-cli@$CURRENT_VERSION version >/dev/null 2>&1; then
            echo "Version $CURRENT_VERSION of @edycutjong/silo-cli is already published to npmjs, skipping."
          else
            echo "Publishing @edycutjong/silo-cli version $CURRENT_VERSION to npmjs..."
            npm publish --provenance --access public --ignore-scripts
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://npm.pkg.github.com"

      - name: Publish CLI to GitHub Packages
        run: |
          cd cli
          npm publish --access public --ignore-scripts || echo "CLI already published or error"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── STAGE 8: Deploy to Railway (main only) ────────────────
  deploy-railway:
    name: "Stage 8 · Deploy to Railway"
    needs: [publish-npm]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            agent/package-lock.json
            cli/package-lock.json
            ui/package-lock.json

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy UI to Railway
        run: |
          CLEANED_TOKEN=$(echo -n "$RAILWAY_TOKEN" | tr -d '\r\n ')
          RAILWAY_TOKEN="$CLEANED_TOKEN" railway up --service silo-ui --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Agent to Railway
        run: |
          CLEANED_TOKEN=$(echo -n "$RAILWAY_TOKEN" | tr -d '\r\n ')
          RAILWAY_TOKEN="$CLEANED_TOKEN" railway up --service silo-agent --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Get current version
        run: echo "NEW_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Build release packages
        run: |
          if [ -f "sdk/package.json" ]; then
            cd sdk && npm pack && mv *.tgz ../ && cd ..
          fi
          if [ -f "cli/package.json" ]; then
            cd cli && npm pack && mv *.tgz ../ && cd ..
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tgz
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
